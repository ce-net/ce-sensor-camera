[app]
name = "ce-sensor-camera"
version = "0.1.0"
summary = "Cap-gated camera sensor with a start/stop/quality/take-image control API (Python script ceapp)"
runtime = "script"
# Discovered by name/topic, never by node address. A consumer holds a capability and subscribes.
provides = ["sensor.camera"]

[script]
interpreter = "python3"
entry = "main.py"

# A camera is a producer with a small control surface. Every device runs it as a daemon;
# the single `ce` service supervises + restarts it. No build step — edit main.py and reinstall.
[daemon]
enabled = true

# Interpreted host process (like native): no sandbox, reaches the local node only.
[sandbox]
tier = "none"
net = "mesh-only"

[deps]
requires = ["native"]
capabilities = []
